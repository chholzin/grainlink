name: ⛓ GRAINLINK CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. Lint & Syntax Check ──────────────────────────────────────────────────
  lint:
    name: 🔍 Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 pyflakes

      - name: Flake8 syntax check
        run: |
          # Stop on syntax errors or undefined names
          flake8 server.py --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "✅ No syntax errors found"

      - name: Check imports resolve
        run: |
          python -c "import ast, sys; ast.parse(open('server.py').read()); print('✅ server.py parses cleanly')"

  # ── 2. Docker Build Test ────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    # Only run on push to main to save CI minutes (build is slow due to PyTorch)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: grainlink:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent cache from growing indefinitely
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke test — server imports
        run: |
          docker run --rm \
            -e DB_PATH=/tmp/test.db \
            -e LOG_PATH=/tmp/test.log \
            grainlink:ci \
            python -c "
          import server
          print('✅ server.py imports successfully')
          print('✅ Embedding model loaded')
          print('✅ MCP app initialised')
          "

  # ── 3. Release summary ──────────────────────────────────────────────────────
  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [lint]
    if: always()

    steps:
      - name: Print result
        run: |
          echo "┌─────────────────────────────────────┐"
          echo "│  ⛓  GRAINLINK CI Results             │"
          echo "├─────────────────────────────────────┤"
          echo "│  Lint:         ${{ needs.lint.result }}"
          echo "└─────────────────────────────────────┘"
          echo ""
          echo "Every thought. Every agent. One link."
